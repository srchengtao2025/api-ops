# 阿里云百炼（DashScope）错误码知识库
- code: InvalidParameter
  http_status: 400
  category: client
  severity: info
  root_causes:
    - 请求参数非法（top_p / temperature / max_tokens 越界）
    - 模型名错误或 region 不支持
  patterns:
    - "InvalidParameter"
    - "param invalid"
    - "range error"
    - "ParameterInvalid"
  actions:
    - 校准参数范围
    - 参考 API 文档默认值
    - 确认 model name 在 region 内可用
  doc_url: https://help.aliyun.com/zh/model-studio/developer-reference/error-code

- code: QuotaExceeded
  http_status: 429
  category: rate_limit
  severity: warning
  root_causes:
    - 阿里云百炼 RPM / TPM 配额耗尽
    - 免费额度用尽
  patterns:
    - "QuotaExceeded"
    - "RPM limit"
    - "TPM limit"
    - "rate limit exceeded"
  actions:
    - 申请提升配额（工单）
    - 多 API key 轮询
    - 错峰调度（避开业务高峰）
  doc_url: https://help.aliyun.com/zh/model-studio/developer-reference/quota

- code: InternalError
  http_status: 500
  category: server
  severity: high
  root_causes:
    - 阿里云百炼服务端临时故障
    - 推理集群异常
  patterns:
    - "InternalError"
    - "service unavailable"
    - "5xx"
    - "system busy"
  actions:
    - 重试（带 1s/3s/10s 退避）
    - 切换备用 channel
    - 关注 status.aliyun.com
  doc_url: https://help.aliyun.com/zh/model-studio/developer-reference/error-code

- code: AccessDenied
  http_status: 403
  category: auth
  severity: high
  root_causes:
    - API key 无效或过期
    - 未开通对应模型服务
  patterns:
    - "AccessDenied"
    - "InvalidApiKey"
    - "Authentication failed"
    - "Unauthorized"
  actions:
    - 检查 API key 是否正确
    - 重新生成并替换 key
    - 在百炼控制台确认模型服务已开通
  doc_url: https://help.aliyun.com/zh/model-studio/developer-reference/authentication
